name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generate src/content/gallery.json before the type-check/build steps.
      # (Vercel runs `npm run build`, whose prebuild hook does this automatically.)
      - name: Generate gallery manifest
        run: node scripts/gen-gallery.mjs

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
